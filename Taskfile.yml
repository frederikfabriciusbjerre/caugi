version: "3"

tasks:
  paper-examples:
    dir: paper
    desc: Generate PDF figures for the paper
    sources:
      - "paper/examples.R"
    generates:
      - "paper/figures/*.pdf"
    cmds:
      - Rscript examples.R

  paper-build:
    desc: Build JOSS paper locally
    deps: [paper-examples]
    dir: paper
    sources:
      - "paper/paper.md"
      - "paper/paper.bib"
      - "paper/examples.R"
    generates:
      - "paper/paper.pdf"
    cmds:
      - |
        docker run --rm \
          --volume $PWD:/data \
          --user $(id -u):$(id -g) \
          --env JOURNAL=joss \
          openjournals/inara
      - echo "Paper built!"

  paper-preview:
    watch: true
    sources:
      - "paper/paper.md"
      - "paper/paper.bib"
      - "paper/examples.R"
    cmds:
      - task: paper-build
      - echo "Watching for changes"

  paper-wordcount:
    cmds:
      - pandoc paper/paper.md -t plain | wc -w

  prune-vendor:
    desc: Strip non-build files from vendored Rust crates (keeps paths short)
    sources:
      - "src/rust/vendor.tar.xz"
      - "tools/prune-vendor.R"
    cmds:
      - Rscript tools/prune-vendor.R

  vendor:
    desc: Re-vendor Rust deps and prune them (run after Cargo.lock changes)
    sources:
      - "src/rust/Cargo.toml"
      - "src/rust/Cargo.lock"
    generates:
      - "src/rust/vendor.tar.xz"
      - "src/rust/vendor-config.toml"
    cmds:
      - Rscript -e 'rextendr::vendor_pkgs(overwrite = TRUE)'
      - task: prune-vendor
